<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Jira</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f1a;
    --surface: #131625;
    --surface2: #1a1e35;
    --border: rgba(255,255,255,.07);
    --text: #e2e8f0;
    --muted: #64748b;
    --accent-indigo: #6366f1;
    --accent-cyan: #22d3ee;
    --accent-emerald: #10b981;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --accent-violet: #a855f7;
    --accent-orange: #fb923c;
    --accent-sky: #0ea5e9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0f1230 0%, #1a1040 50%, #0f1230 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0);
    background-size: 28px 28px;
    pointer-events: none;
  }
  .header-left { display: flex; align-items: center; gap: 16px; position: relative; }
  .header-icon { font-size: 2.2rem; filter: drop-shadow(0 4px 14px rgba(99,102,241,.4)); }
  .header-title { font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: -.5px; }
  .header-title span { color: var(--accent-indigo); }
  .header-meta { font-size: .75rem; color: var(--muted); }

  .header-right { display: flex; align-items: center; gap: 14px; position: relative; }
  #last-updated { font-size: .75rem; color: var(--muted); }

  .project-selector-wrap { display: flex; flex-direction: column; gap: 3px; }
  .project-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .project-select {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: .85rem;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
    min-width: 220px;
  }
  .project-select:focus { border-color: var(--accent-indigo); }

  .btn-refresh {
    display: flex; align-items: center; gap: 6px;
    background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.35);
    color: var(--accent-indigo); border-radius: 8px;
    padding: 8px 16px; font-size: .8rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .btn-refresh:hover { background: rgba(99,102,241,.3); }
  .btn-refresh.loading { opacity: .6; pointer-events: none; }

  /* ── LAYOUT ── */
  .container { padding: 28px 32px; max-width: 1600px; margin: 0 auto; }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, border-color .2s;
  }
  .kpi-card:hover { transform: translateY(-2px); border-color: var(--kpi-accent); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--kpi-accent);
    border-radius: 16px 16px 0 0;
  }
  .kpi-icon { font-size: 1.6rem; margin-bottom: 10px; }
  .kpi-value {
    font-size: 2.2rem; font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, var(--kpi-accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .kpi-label { font-size: .72rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: .05em; }

  /* ── FILTERS ── */
  .filters-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 28px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .filter-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: .82rem;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
    min-width: 140px;
  }
  .filter-group select:focus { border-color: var(--accent-indigo); }
  .filter-search {
    flex: 1; min-width: 200px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .filter-search label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .filter-search input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: .82rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .filter-search input:focus { border-color: var(--accent-indigo); }
  .filter-search input::placeholder { color: var(--muted); }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: .8rem;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    align-self: flex-end;
  }
  .btn-clear:hover { border-color: var(--accent-rose); color: var(--accent-rose); }

  /* ── CHARTS ── */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .chart-title {
    font-size: .78rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin-bottom: 16px;
  }
  .chart-wrap { position: relative; height: 200px; }

  /* ── TABLE ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .table-title { font-size: .9rem; font-weight: 600; }
  .table-count { font-size: .75rem; color: var(--muted); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  th {
    text-align: left; padding: 10px 14px;
    background: var(--surface2);
    font-size: .68rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color .15s;
  }
  th:hover { color: var(--text); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .key-badge {
    font-family: monospace; font-size: .75rem;
    background: rgba(99,102,241,.15);
    color: var(--accent-indigo);
    border: 1px solid rgba(99,102,241,.3);
    border-radius: 5px; padding: 2px 7px;
    white-space: nowrap;
  }
  .summary-cell { max-width: 320px; }
  .summary-text {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; line-height: 1.4;
  }

  /* STATUS PILLS */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    border-radius: 100px; padding: 3px 10px;
    font-size: .7rem; font-weight: 600;
    white-space: nowrap;
  }
  .pill::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }

  /* TYPE BADGE */
  .type-badge {
    display: inline-block; border-radius: 5px; padding: 2px 8px;
    font-size: .68rem; font-weight: 600;
  }

  /* PLATFORM BADGE */
  .plat-badge {
    display: inline-block; border-radius: 5px; padding: 2px 8px;
    font-size: .68rem; font-weight: 600;
  }
  .plat-web     { background: rgba(34,211,238,.12); color: var(--accent-cyan); }
  .plat-android { background: rgba(16,185,129,.12); color: var(--accent-emerald); }
  .plat-ios     { background: rgba(168,85,247,.12); color: var(--accent-violet); }
  .plat-general { background: rgba(100,116,139,.1); color: var(--muted); }

  /* PRIORITY */
  .prio-highest { color: var(--accent-rose); font-weight: 700; }
  .prio-high    { color: var(--accent-orange); font-weight: 600; }
  .prio-medium  { color: var(--accent-amber); }
  .prio-low     { color: var(--accent-sky); }

  /* DATE */
  .date-overdue { color: var(--accent-rose); font-weight: 600; }

  /* EMPTY / ERROR */
  .state-box {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: .9rem;
  }
  .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  .page-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 6px 12px; font-size: .8rem; cursor: pointer;
    transition: all .15s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent-indigo); color: var(--accent-indigo); }
  .page-btn:disabled { opacity: .3; cursor: default; }
  .page-btn.active { background: var(--accent-indigo); border-color: var(--accent-indigo); color: #fff; }
  .page-info { font-size: .78rem; color: var(--muted); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="header-icon">📊</div>
    <div>
      <div class="header-title">Dashboard <span id="project-name">Jira</span></div>
      <div class="header-meta" id="header-meta">Jira Cloud · Selecciona un proyecto</div>
    </div>
  </div>
  <div class="header-right">
    <div class="project-selector-wrap">
      <span class="project-label">Proyecto</span>
      <select id="project-select" class="project-select" onchange="onProjectChange()">
        <option value="">Cargando proyectos…</option>
      </select>
    </div>
    <span id="last-updated">—</span>
    <button class="btn-refresh" id="btn-refresh" onclick="reloadFromServer()">
      ↻ Actualizar
    </button>
  </div>
</header>

<div class="container">

  <!-- KPI CARDS (generated dynamically) -->
  <div id="kpi-grid" class="kpi-grid"></div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <div class="filter-search">
      <label>Buscar</label>
      <input id="f-search" type="text" placeholder="Clave, resumen, responsable…" oninput="applyFilters()" />
    </div>
    <div class="filter-group">
      <label>Estado</label>
      <select id="f-status" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Tipo</label>
      <select id="f-type" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group" id="platform-filter">
      <label>Plataforma</label>
      <select id="f-platform" onchange="applyFilters()">
        <option value="">Todas</option>
        <option value="Web">Web</option>
        <option value="Android">Android</option>
        <option value="iOS">iOS</option>
        <option value="General">General</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Prioridad</label>
      <select id="f-priority" onchange="applyFilters()">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Responsable</label>
      <select id="f-assignee" onchange="applyFilters()">
        <option value="">Todos</option>
      </select>
    </div>
    <button class="btn-clear" onclick="clearFilters()">✕ Limpiar</button>
  </div>

  <!-- CHARTS -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Por estado</div>
      <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Carga por responsable</div>
      <div class="chart-wrap"><canvas id="chart-assignee"></canvas></div>
    </div>
    <div class="chart-card" id="chart-platform-card">
      <div class="chart-title">Por plataforma</div>
      <div class="chart-wrap"><canvas id="chart-platform"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Por tipo</div>
      <div class="chart-wrap"><canvas id="chart-type"></canvas></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Incidencias</span>
      <span class="table-count" id="table-count">—</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('key')">Clave <span id="sort-key"></span></th>
            <th>Resumen</th>
            <th onclick="sortBy('type')">Tipo <span id="sort-type"></span></th>
            <th onclick="sortBy('status')">Estado <span id="sort-status"></span></th>
            <th class="platform-col" onclick="sortBy('platform')">Plataforma <span id="sort-platform"></span></th>
            <th onclick="sortBy('assignee')">Responsable <span id="sort-assignee"></span></th>
            <th onclick="sortBy('priority')">Prioridad <span id="sort-priority"></span></th>
            <th onclick="sortBy('updated')">Actualizada <span id="sort-updated"></span></th>
            <th onclick="sortBy('duedate')">Vencimiento <span id="sort-duedate"></span></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div><!-- /container -->

<script>
// ── STATE ──
let allTasks = [];
let filtered = [];
let sortCol = 'updated';
let sortDir = -1;
let page = 1;
const PAGE_SIZE = 30;
let currentProject = '';
let platformEnabled = true;

// ── COLOR PALETTE ──
const PALETTE = ['#6366f1','#22d3ee','#10b981','#f59e0b','#f43f5e','#a855f7','#fb923c','#0ea5e9'];

// Dynamic status colors: { color, bg }
const PILL_COLORS = [
  { color: '#0ea5e9', bg: 'rgba(14,165,233,.12)' },
  { color: '#f59e0b', bg: 'rgba(245,158,11,.12)' },
  { color: '#10b981', bg: 'rgba(16,185,129,.12)' },
  { color: '#a855f7', bg: 'rgba(168,85,247,.12)' },
  { color: '#22d3ee', bg: 'rgba(34,211,238,.12)' },
  { color: '#6366f1', bg: 'rgba(99,102,241,.12)' },
  { color: '#fb923c', bg: 'rgba(251,146,60,.12)' },
  { color: '#f43f5e', bg: 'rgba(244,63,94,.12)' },
];

const statusColorIndex = new Map();

function getStatusStyle(statusName) {
  const key = statusName.toLowerCase();
  if (!statusColorIndex.has(key)) {
    statusColorIndex.set(key, statusColorIndex.size % PILL_COLORS.length);
  }
  return PILL_COLORS[statusColorIndex.get(key)];
}

function buildStatusColorMap(tasks) {
  statusColorIndex.clear();
  const counts = {};
  tasks.forEach(t => { counts[t.status] = (counts[t.status] || 0) + 1; });
  Object.entries(counts).sort((a, b) => b[1] - a[1]).forEach(([s]) => getStatusStyle(s));
}

// Dynamic type colors
const TYPE_STYLES = {
  'error':  { color: '#f43f5e', bg: 'rgba(244,63,94,.15)' },
  'bug':    { color: '#f43f5e', bg: 'rgba(244,63,94,.15)' },
  'story':  { color: '#10b981', bg: 'rgba(16,185,129,.15)' },
  'epic':   { color: '#a855f7', bg: 'rgba(168,85,247,.15)' },
  'task':   { color: '#6366f1', bg: 'rgba(99,102,241,.15)' },
  'tarea':  { color: '#6366f1', bg: 'rgba(99,102,241,.15)' },
  'subtask':{ color: '#22d3ee', bg: 'rgba(34,211,238,.15)' },
};
function getTypeStyle(typeName) {
  return TYPE_STYLES[typeName.toLowerCase()] || { color: '#6366f1', bg: 'rgba(99,102,241,.15)' };
}

// ── PRIORITY ──
const PRIO_ORDER = { highest: 0, high: 1, medium: 2, low: 3, lowest: 4 };
function prioOrder(p) { return PRIO_ORDER[p?.toLowerCase()] ?? 9; }
function prioClass(p) {
  const k = p?.toLowerCase();
  if (k === 'highest') return 'prio-highest';
  if (k === 'high')    return 'prio-high';
  if (k === 'medium')  return 'prio-medium';
  if (k === 'low')     return 'prio-low';
  return '';
}

// ── CHARTS ──
const charts = {};
function makeChart(id, type, data, options = {}) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, { type, data, options: { ...defaultChartOpts(type), ...options } });
}
function defaultChartOpts(type) {
  const base = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: type === 'doughnut', labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } } },
  };
  if (type !== 'doughnut') {
    base.scales = {
      x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
      y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.06)' } },
    };
  }
  return base;
}

// ── PROJECTS ──
async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const projects = await res.json();
    if (projects.error) throw new Error(projects.error);

    const sel = document.getElementById('project-select');
    sel.innerHTML = projects.map(p =>
      `<option value="${escHtml(p.key)}">${escHtml(p.key)} — ${escHtml(p.name)}</option>`
    ).join('');

    const saved = localStorage.getItem('jira-project');
    const exists = projects.some(p => p.key === saved);
    currentProject = exists ? saved : (projects[0]?.key || '');
    sel.value = currentProject;

    const proj = projects.find(p => p.key === currentProject);
    if (proj) updateProjectLabel(proj);
  } catch (e) {
    console.error('Error cargando proyectos:', e);
    document.getElementById('project-select').innerHTML = '<option value="">Error al cargar proyectos</option>';
  }
}

function updateProjectLabel(proj) {
  document.getElementById('project-name').textContent = proj.name || proj.key;
  document.getElementById('header-meta').textContent = `${proj.key} · Jira Cloud`;
}

function onProjectChange() {
  const sel = document.getElementById('project-select');
  currentProject = sel.value;
  if (!currentProject) return;
  localStorage.setItem('jira-project', currentProject);
  const proj = { key: currentProject, name: sel.options[sel.selectedIndex].text.split(' — ')[1] || currentProject };
  updateProjectLabel(proj);
  reloadFromServer();
}

// ── LOAD FROM SERVER ──
async function reloadFromServer() {
  if (!currentProject) return;
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  btn.textContent = '⏳ Cargando…';
  try {
    const res = await fetch(`/api/issues?project=${encodeURIComponent(currentProject)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allTasks = await res.json();
    document.getElementById('last-updated').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es');
    buildStatusColorMap(allTasks);
    populateFilters();
    applyFilters();
  } catch (e) {
    showError(e.message);
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '↻ Actualizar';
  }
}

function showError(msg) {
  const cols = platformEnabled ? 9 : 8;
  document.getElementById('table-body').innerHTML =
    `<tr><td colspan="${cols}"><div class="state-box"><div class="icon">⚠️</div>${msg}</div></td></tr>`;
}

// ── POPULATE FILTER SELECTS ──
function populateFilters() {
  const fill = (id, values) => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    [...sel.options].slice(1).forEach(o => o.remove());
    [...new Set(values)].sort().forEach(v => {
      const o = document.createElement('option');
      o.value = o.textContent = v;
      sel.appendChild(o);
    });
    sel.value = cur;
  };
  fill('f-status',   allTasks.map(t => t.status));
  fill('f-type',     allTasks.map(t => t.type));
  fill('f-priority', allTasks.map(t => t.priority));
  fill('f-assignee', allTasks.map(t => t.assignee));
}

// ── FILTERS ──
function applyFilters() {
  const search   = document.getElementById('f-search').value.trim().toLowerCase();
  const status   = document.getElementById('f-status').value;
  const type     = document.getElementById('f-type').value;
  const platform = document.getElementById('f-platform').value;
  const priority = document.getElementById('f-priority').value;
  const assignee = document.getElementById('f-assignee').value;

  filtered = allTasks.filter(t => {
    if (status   && t.status   !== status)   return false;
    if (type     && t.type     !== type)     return false;
    if (platform && t.platform !== platform) return false;
    if (priority && t.priority !== priority) return false;
    if (assignee && t.assignee !== assignee) return false;
    if (search) {
      const haystack = `${t.key} ${t.summary} ${t.assignee}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  page = 1;
  sortData();
  updateKPIs(filtered);
  renderCharts(filtered);
  renderTable();
}

function clearFilters() {
  ['f-search','f-status','f-type','f-platform','f-priority','f-assignee'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
  });
  applyFilters();
}

// ── SORT ──
function sortBy(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('[id^="sort-"]').forEach(el => el.textContent = '');
  const el = document.getElementById('sort-' + col);
  if (el) el.textContent = sortDir === 1 ? ' ↑' : ' ↓';
  sortData();
  renderTable();
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol] ?? '';
    let vb = b[sortCol] ?? '';
    if (sortCol === 'priority') { va = prioOrder(va); vb = prioOrder(vb); return (va - vb) * sortDir; }
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });
}

// ── KPIs (dynamic) ──
function updateKPIs(tasks) {
  const statusCounts = {};
  let bugCount = 0;
  tasks.forEach(t => {
    statusCounts[t.status] = (statusCounts[t.status] || 0) + 1;
    if (['error','bug'].includes(t.type.toLowerCase())) bugCount++;
  });

  const sortedStatuses = Object.entries(statusCounts).sort((a, b) => b[1] - a[1]);

  let html = `
    <div class="kpi-card" style="--kpi-accent:#6366f1">
      <div class="kpi-icon">📋</div>
      <div class="kpi-value">${tasks.length}</div>
      <div class="kpi-label">Total</div>
    </div>`;

  sortedStatuses.forEach(([status, count]) => {
    const color = getStatusStyle(status).color;
    html += `
    <div class="kpi-card" style="--kpi-accent:${color}">
      <div class="kpi-icon" style="color:${color};font-size:1rem">●</div>
      <div class="kpi-value">${count}</div>
      <div class="kpi-label">${escHtml(status)}</div>
    </div>`;
  });

  html += `
    <div class="kpi-card" style="--kpi-accent:#f43f5e">
      <div class="kpi-icon">🐛</div>
      <div class="kpi-value">${bugCount}</div>
      <div class="kpi-label">Errores / Bugs</div>
    </div>`;

  document.getElementById('kpi-grid').innerHTML = html;
}

// ── CHARTS ──
function renderCharts(tasks) {
  // Status doughnut
  const statusMap = {};
  tasks.forEach(t => { statusMap[t.status] = (statusMap[t.status] || 0) + 1; });
  const statusColors = Object.keys(statusMap).map(s => getStatusStyle(s).color);
  makeChart('chart-status', 'doughnut', {
    labels: Object.keys(statusMap),
    datasets: [{ data: Object.values(statusMap), backgroundColor: statusColors, borderWidth: 0, hoverOffset: 6 }],
  });

  // Assignee bar
  const aMap = {};
  tasks.forEach(t => { if (t.assignee !== 'Sin asignar') aMap[t.assignee] = (aMap[t.assignee] || 0) + 1; });
  const aSorted = Object.entries(aMap).sort((a,b) => b[1]-a[1]).slice(0, 8);
  makeChart('chart-assignee', 'bar', {
    labels: aSorted.map(e => e[0].split(' ')[0]),
    datasets: [{ data: aSorted.map(e => e[1]), backgroundColor: PALETTE, borderRadius: 6, borderSkipped: false }],
  }, { indexAxis: 'y' });

  // Platform bar (only if enabled)
  if (platformEnabled) {
    const platMap = {};
    tasks.forEach(t => { if (t.platform) platMap[t.platform] = (platMap[t.platform] || 0) + 1; });
    makeChart('chart-platform', 'bar', {
      labels: Object.keys(platMap),
      datasets: [{ data: Object.values(platMap), backgroundColor: ['#22d3ee','#10b981','#a855f7','#64748b'], borderRadius: 6, borderSkipped: false }],
    });
  }

  // Type doughnut
  const typeMap = {};
  tasks.forEach(t => { typeMap[t.type] = (typeMap[t.type] || 0) + 1; });
  const typeColors = Object.keys(typeMap).map(t => getTypeStyle(t).color);
  makeChart('chart-type', 'doughnut', {
    labels: Object.keys(typeMap),
    datasets: [{ data: Object.values(typeMap), backgroundColor: typeColors, borderWidth: 0, hoverOffset: 6 }],
  });
}

// ── TABLE ──
function renderTable() {
  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  document.getElementById('table-count').textContent = `${total} incidencia${total !== 1 ? 's' : ''}`;

  const colspan = platformEnabled ? 9 : 8;
  const tbody = document.getElementById('table-body');
  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="${colspan}"><div class="state-box"><div class="icon">🔍</div>Sin resultados</div></td></tr>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const today = new Date().toISOString().slice(0, 10);
  tbody.innerHTML = slice.map(t => {
    const sc  = getStatusStyle(t.status);
    const ts  = getTypeStyle(t.type);
    const due = t.duedate ? `<span class="${t.duedate < today ? 'date-overdue' : ''}">${t.duedate}</span>` : '<span style="color:var(--muted)">—</span>';
    const platCell = platformEnabled
      ? `<td class="platform-col"><span class="plat-badge plat-${(t.platform||'').toLowerCase()}">${escHtml(t.platform||'')}</span></td>`
      : '';
    return `<tr>
      <td><span class="key-badge">${t.key}</span></td>
      <td class="summary-cell"><div class="summary-text" title="${escHtml(t.summary)}">${escHtml(t.summary)}</div></td>
      <td><span class="type-badge" style="color:${ts.color};background:${ts.bg}">${escHtml(t.type)}</span></td>
      <td><span class="pill" style="color:${sc.color};background:${sc.bg}">${escHtml(t.status)}</span></td>
      ${platCell}
      <td>${escHtml(t.assignee)}</td>
      <td><span class="${prioClass(t.priority)}">${escHtml(t.priority)}</span></td>
      <td style="white-space:nowrap;color:var(--muted)">${t.updated || '—'}</td>
      <td>${due}</td>
    </tr>`;
  }).join('');

  // Pagination
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>← Ant</button>`;
  pagRange(page, totalPages).forEach(p => {
    if (p === '…') html += `<span class="page-info">…</span>`;
    else html += `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>Sig →</button>`;
  html += `<span class="page-info">Pág ${page} / ${totalPages}</span>`;
  pag.innerHTML = html;
}

function goPage(p) { page = p; renderTable(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

function pagRange(cur, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i+1);
  const r = [];
  if (cur > 3) { r.push(1, '…'); }
  for (let i = Math.max(1, cur-2); i <= Math.min(total, cur+2); i++) r.push(i);
  if (cur < total-2) { r.push('…', total); }
  return r;
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
(async () => {
  // Check platform detection config
  try {
    const h = await fetch('/api/health').then(r => r.json());
    platformEnabled = h.platformDetection !== false;
  } catch {}

  if (!platformEnabled) {
    document.getElementById('platform-filter').style.display = 'none';
    document.getElementById('chart-platform-card').style.display = 'none';
    document.querySelectorAll('.platform-col').forEach(el => el.style.display = 'none');
  }

  await loadProjects();
  if (currentProject) await reloadFromServer();
})();
